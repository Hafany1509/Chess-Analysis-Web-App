<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Analysis - Lê Huy Hải</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h2>Hệ thống Phân tích Ván đấu Cờ vua</h2>
        <p>Sinh viên thực hiện: Lê Huy Hải - B23DCCN272</p>
    </header>

    <div class="main-layout">
        <div class="eval-bar-container">
            <div id="eval-bar" class="eval-bar"></div>
        </div>

        <div id="myBoard"></div>

        <div class="side-panel">
            <div class="info-box">
                <div class="status-item">Lượt đi: <span id="turn" class="status-val">Trắng</span></div>
                <div class="status-item">Trạng thái: <span id="status" class="status-val">Sẵn sàng</span></div>
                <div id="eval-text" class="status-item">Đánh giá: 0.0</div>
            </div>

            <div class="history-box">
                <strong>Lịch sử nước đi</strong>
                <div id="history-list">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
