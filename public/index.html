<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Analysis - Lê Huy Hải</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; }
        #myBoard { width: 450px; margin: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .info { background: #34495e; padding: 15px; border-radius: 8px; width: 420px; text-align: center; }
        .status { font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

    <h2>Hệ thống Phân tích Ván đấu Cờ vua</h2>
    <p>Sinh viên thực hiện: Lê Huy Hải - B23DCCN272</p>

    <div id="myBoard"></div>

    <div class="info">
        <div>Lượt đi: <span id="turn" class="status">Trắng</span></div>
        <div>Trạng thái: <span id="status" class="status">Sẵn sàng</span></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $turn = $('#turn');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            // Chỉ cho phép kéo quân của bên đến lượt
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = 'Bình thường';
            if (game.in_checkmate()) status = 'Chiếu bí! Kết thúc.';
            else if (game.in_draw()) status = 'Hòa cờ.';
            else if (game.in_check()) status = 'Đang bị chiếu!';

            $status.html(status);
            $turn.html(game.turn() === 'w' ? 'Trắng' : 'Đen');
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };
        board = Chessboard('myBoard', config);
    </script>
</body>
</html>
